<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Expense Tracker - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h3 class="mb-3">Expense Tracker</h3>

            <div id="alertBox"></div>

            <ul class="nav nav-tabs mb-3" role="tablist">
              <li class="nav-item" role="presentation">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#loginTab" type="button" role="tab">Login</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#registerTab" type="button" role="tab">Register</button>
              </li>
            </ul>

            <div class="tab-content">
              <div class="tab-pane fade show active" id="loginTab" role="tabpanel">
                <form id="loginForm">
                  <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="loginEmail" required>
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="loginPassword" required minlength="6">
                  </div>
                  <button class="btn btn-primary w-100" type="submit">Login</button>
                </form>
              </div>

              <div class="tab-pane fade" id="registerTab" role="tabpanel">
                <form id="registerForm">
                  <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-control" id="regName" required>
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="regEmail" required>
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Password (6+ chars)</label>
                    <input type="password" class="form-control" id="regPassword" required minlength="6">
                  </div>
                  <button class="btn btn-success w-100" type="submit">Create account</button>
                </form>
              </div>
            </div>

            <p class="text-muted small mt-3 mb-0">
              After login you’ll be redirected to the dashboard.
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/config.js"></script>
  <script src="./js/auth.js"></script>
</body>
</html>
