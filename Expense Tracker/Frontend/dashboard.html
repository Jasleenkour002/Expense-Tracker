<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Expense Tracker - Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>

<body class="bg-light">
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="#">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-2">
          <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
        </svg>
        ExpenseTracker
      </a>
      <div class="ms-auto d-flex gap-3 align-items-center">
        <span class="small" id="userLabel"></span>
        <button class="btn btn-outline-danger btn-sm px-3" id="logoutBtn">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <div id="alertBox"></div>

    <div class="row g-3">
      <div class="col-lg-4">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="mb-3">Add Expense</h5>

            <form id="expenseForm">
              <div class="mb-2">
                <label class="form-label">Title</label>
                <input class="form-control" id="title" required>
              </div>

              <div class="mb-2">
                <label class="form-label">Amount</label>
                <input type="number" class="form-control" id="amount" required min="0" step="0.01">
              </div>

              <div class="mb-2">
                <label class="form-label">Category</label>
                <select class="form-select" id="category" required>
                  <option>Food</option>
                  <option>Transport</option>
                  <option>Bills</option>
                  <option>Shopping</option>
                  <option>Health</option>
                  <option>Rent</option>
                  <option>Other</option>
                </select>
              </div>

              <div class="mb-2">
                <label class="form-label">Date</label>
                <input type="date" class="form-control" id="date" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Note (optional)</label>
                <textarea class="form-control" id="note" rows="2" maxlength="200"></textarea>
              </div>

              <button class="btn btn-primary w-100" type="submit">Save Expense</button>
            </form>
          </div>
        </div>

        <div class="card shadow-sm mt-3">
          <div class="card-body">
            <h6 class="mb-2">Summary</h6>
            <div class="d-flex justify-content-between">
              <span class="text-muted">Total (filtered)</span>
              <strong id="totalAmount">₹0</strong>
            </div>
            <div class="d-flex justify-content-between mt-1">
              <span class="text-muted">Count</span>
              <strong id="totalCount">0</strong>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="d-flex flex-wrap gap-2 align-items-end">
              <div>
                <label class="form-label">From</label>
                <input type="date" class="form-control" id="from">
              </div>
              <div>
                <label class="form-label">To</label>
                <input type="date" class="form-control" id="to">
              </div>
              <div>
                <label class="form-label">Category</label>
                <select class="form-select" id="filterCategory">
                  <option value="">All</option>
                  <option>Food</option>
                  <option>Transport</option>
                  <option>Bills</option>
                  <option>Shopping</option>
                  <option>Health</option>
                  <option>Rent</option>
                  <option>Other</option>
                </select>
              </div>
              <div class="flex-grow-1">
                <label class="form-label">Search</label>
                <input class="form-control" id="q" placeholder="title or note">
              </div>
              <div class="d-flex gap-2">
                <button class="btn btn-outline-secondary" id="resetBtn">Reset</button>
                <button class="btn btn-dark" id="applyBtn">Apply</button>
              </div>
            </div>

            <hr>

            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Title</th>
                    <th>Category</th>
                    <th class="text-end">Amount</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="expenseRows">
                  <tr>
                    <td colspan="5" class="text-muted">Loading...</td>
                  </tr>
                </tbody>
              </table>
            </div>

          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/config.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/dashboard.js"></script>
</body>

</html>
